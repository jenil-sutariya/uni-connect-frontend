<svg width="220" height="60" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="buildingGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FC3F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradientDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FC3F7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Modern Building/Campus Icon -->
  <g transform="translate(10, 10)">
    <!-- Main building -->
    <rect x="5" y="15" width="20" height="25" fill="url(#buildingGradientDark)" rx="2"/>
    <!-- Building windows -->
    <rect x="8" y="18" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="13" y="18" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="18" y="18" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="8" y="23" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="13" y="23" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="18" y="23" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="8" y="28" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="13" y="28" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="18" y="28" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="8" y="33" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    <rect x="18" y="33" width="3" height="3" fill="#1A202C" opacity="0.8"/>
    
    <!-- Entrance -->
    <rect x="12" y="33" width="6" height="7" fill="#4FC3F7"/>
    
    <!-- Side buildings -->
    <rect x="0" y="20" width="8" height="20" fill="#81C784" opacity="0.7" rx="1"/>
    <rect x="27" y="25" width="8" height="15" fill="#81C784" opacity="0.7" rx="1"/>
    
    <!-- Flag/Banner on top -->
    <rect x="14" y="8" width="2" height="8" fill="#4FC3F7"/>
    <path d="M16 8 L24 8 L22 11 L24 14 L16 14 Z" fill="#FF7043"/>
  </g>
  
  <!-- Modern Typography -->
  <text x="50" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#textGradientDark)">UNI</text>
  <text x="50" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#81C784">CONNECT</text>
  
  <!-- Network Connection Visual -->
  <g transform="translate(160, 15)">
    <!-- Network nodes -->
    <circle cx="0" cy="0" r="4" fill="#4FC3F7"/>
    <circle cx="20" cy="-5" r="4" fill="#81C784"/>
    <circle cx="25" cy="15" r="4" fill="#A5D6A7"/>
    <circle cx="10" cy="25" r="4" fill="#4FC3F7"/>
    <circle cx="-5" cy="20" r="4" fill="#FF7043"/>
    
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="20" y2="-5" stroke="#4FC3F7" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="-5" x2="25" y2="15" stroke="#81C784" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="15" x2="10" y2="25" stroke="#A5D6A7" stroke-width="2" opacity="0.6"/>
    <line x1="10" y1="25" x2="-5" y2="20" stroke="#4FC3F7" stroke-width="2" opacity="0.6"/>
    <line x1="-5" y1="20" x2="0" y2="0" stroke="#FF7043" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="0" x2="25" y2="15" stroke="#4FC3F7" stroke-width="2" opacity="0.4"/>
  </g>
</svg>
